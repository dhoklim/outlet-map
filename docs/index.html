<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Utility — 전원 지도</title>
<style>
  :root {
    --ink: #202124;
    --muted: #6f756f;
    --line: #d8ddd2;
    --paper: #fbfaf4;
    --panel: #ffffff;
    --accent: #f0c84b;
    --accent-dark: #252523;
    --green: #1f9d55;
    --red: #e02424;
    --orange: #ff9f1c;
    --gray: #9aa0a6;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background: #ebe8dd;
    font-family: "Avenir Next", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: rgba(251, 250, 244, .96);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 220px;
  }
  .brand img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 8px;
  }
  .brand-title {
    font-weight: 800;
    letter-spacing: .02em;
    line-height: 1;
  }
  .brand-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 3px;
  }
  #tabs {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }
  .tab {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 7px 12px;
    border-radius: 8px;
  }
  .tab.active {
    color: #fff;
    background: var(--accent-dark);
    border-color: var(--accent-dark);
  }
  input[type=text] {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    background: #fff;
  }
  .tab-row { display: contents; }
  .sync {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 18px;
    height: calc(100vh - 65px);
    padding: 18px;
  }
  .map-stage {
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
  }
  .room-heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
  }
  .room-heading h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.1;
  }
  .room-heading p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .key {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .map-shell {
    display: grid;
    place-items: center;
    min-height: 0;
  }
  .map {
    position: relative;
    width: min(100%, calc((100vh - 150px) * 1.432));
    aspect-ratio: 2798 / 2056;
    background: var(--paper) center / 100% 100% no-repeat;
    border: 1px solid rgba(32, 33, 36, .18);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 18px 46px rgba(32, 33, 36, .13);
  }
.map::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .ph-note {
    position: absolute;
    inset: auto 0 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 4;
    border: none;
    background: transparent;
    padding: 0;
  }
  .dot {
    width: 22px;
    height: 22px;
    border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .marker.outlet .dot { border-radius: 999px; }
  .marker.aircon .dot { border-radius: 5px; }
  .marker.selected .dot {
    width: 28px;
    height: 28px;
    border-color: var(--accent-dark);
    outline: 3px solid var(--accent);
  }
  .marker .lbl {
    position: absolute;
    left: 50%;
    top: 28px;
    transform: translateX(-50%);
    padding: 3px 6px;
    border-radius: 6px;
    color: var(--ink);
    background: rgba(255,255,255,.84);
    font-size: 11px;
    line-height: 1.25;
    white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.1);
  }
  .marker.low .lbl {
    top: auto;
    bottom: 30px;
  }

  .panel {
    min-height: 0;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 10px 30px rgba(32, 33, 36, .08);
  }
  .panel h2 {
    margin: 12px 0 2px;
    font-size: 20px;
  }
  .meta {
    color: var(--muted);
    font-size: 13px;
  }
  .status {
    margin-top: 10px;
    font-weight: 800;
  }
  .stars {
    margin-top: 4px;
    letter-spacing: .08em;
  }
  .recent {
    margin: 12px 0;
    padding: 10px;
    border-radius: 8px;
    background: #f7f5eb;
    font-size: 13px;
  }
  .recent div { margin-top: 4px; }
  hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 14px 0;
  }
  .form.disabled {
    opacity: .42;
    pointer-events: none;
  }
  .form label {
    display: block;
    margin: 8px 0 3px;
    color: var(--muted);
    font-size: 13px;
  }
  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .row label {
    margin: 0;
    color: var(--ink);
  }
  .submit {
    width: 100%;
    margin-top: 12px;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    color: var(--accent-dark);
    background: var(--accent);
    font-weight: 800;
  }

  /* --- 모바일 전용 컴포넌트 (데스크톱에서는 숨김) --- */
  .sheet-handle {
    display: none;
    width: 40px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 0 auto 12px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .star-row {
    display: none;
    gap: 2px;
    align-items: center;
  }
  .star-btn {
    border: none; background: none;
    font-size: 28px; color: #ddd;
    padding: 2px 4px; cursor: pointer;
    line-height: 1;
    transition: color .1s;
  }
  .star-btn.on { color: var(--accent); }

  /* ── 시간표 탭 ── */
  #schedule-panel {
    padding: 18px;
    max-width: 600px;
    margin: 0 auto;
  }
  .classroom-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .classroom-chip {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    white-space: nowrap;
  }
  .classroom-chip.active {
    background: var(--accent-dark);
    color: var(--accent);
    border-color: var(--accent-dark);
  }
  .schedule-status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
    border: 1px solid var(--line);
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-text { font-weight: 700; font-size: 14px; }
  .status-next { color: var(--muted); font-size: 13px; }
  .schedule-list { display: flex; flex-direction: column; gap: 8px; }
  .schedule-row {
    background: var(--panel);
    border-radius: 10px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .schedule-row.now { border-color: var(--green); background: #f0faf4; }
  .sched-time {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    min-width: 110px;
    margin-top: 2px;
  }
  .sched-course {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sched-prof { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .now-badge {
    background: var(--green);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
  }
  .no-schedule { color: var(--muted); text-align: center; padding: 40px 0; }
  @media (max-width: 640px) {
    .sched-columns { flex-direction: column; gap: 16px; }
  }
  .day-section { margin-bottom: 12px; }
  .day-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    padding: 6px 4px 4px;
    text-transform: uppercase;
  }
  .day-header.today {
    color: var(--accent-dark);
    background: var(--accent);
    padding: 4px 8px;
    border-radius: 6px;
    margin: 0 -4px;
  }
  .day-empty { color: var(--muted); font-size: 13px; padding: 8px 4px; }

  @media (max-width: 880px) {
    body { display: flex; flex-direction: column; height: 100dvh; }

    /* ── 헤더 2행 레이아웃 ── */
    header {
      flex-wrap: wrap;
      height: auto;
      padding: 8px 10px 0;
      gap: 0 8px;
    }
    .brand img, .brand-subtitle { display: none; }
    .brand { min-width: auto; gap: 0; flex: 1; }
    .brand-title { font-size: 14px; }
    #syncInfo { display: none; }

    /* 탭 행: 전체 너비, 가로 스크롤 */
    .tab-row {
      display: flex;
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 4px;
      padding: 6px 0 8px;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    #tabs { display: flex; flex-wrap: nowrap; gap: 4px; overflow: visible; }
    .tab { padding: 5px 10px; font-size: 12px; white-space: nowrap; }

    /* ── 지도 전체화면 ── */
    main { flex: 1; min-height: 0; overflow: hidden; display: block; padding: 0; height: auto; }
    .map-stage { display: flex; flex-direction: column; height: 100%; }
    .room-heading { display: none; }
    .map-shell { flex: 1; min-height: 0; display: block; }
    .map {
      width: 100%; height: 100%;
      border-radius: 0;
      border-left: none; border-right: none;
      aspect-ratio: unset;
    }

    /* ── 마커 터치 영역 확대 ── */
    .dot { width: 28px; height: 28px; }
    .marker.selected .dot { width: 34px; height: 34px; }

    /* ── 바텀 시트 ── */
    .sheet-handle { display: block; }
    .panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: auto;
      max-height: 65vh;
      border-radius: 16px 16px 0 0;
      border: none;
      box-shadow: 0 -4px 24px rgba(32,33,36,.18);
      transform: translateY(100%);
      transition: transform .28s ease, max-height .28s ease;
      overflow-y: hidden;
      z-index: 100;
      padding: 8px 16px 24px;
    }
    .panel.collapsed {
      transform: translateY(0);
      max-height: 148px;
      overflow: hidden;
      cursor: pointer;
    }
    .panel.expanded {
      transform: translateY(0);
      max-height: 65vh;
      overflow-y: auto;
      cursor: default;
    }

    /* ── 별점 탭 ── */
    #starRating { display: flex !important; }
    #rating, #rating + .meta { display: none; }
  }
</style>
</head>

  <aside class="panel">

    <div id="summary"></div>
    <hr>
    <div id="form" class="form disabled">

      <label>별점</label>

          <option>4</option><option selected>5</option>
        </select>
        <span class="meta">1~5</span>
      </div>
      <div id="starRating" class="star-row">
        <button type="button" class="star-btn" data-val="1">★</button>
        <button type="button" class="star-btn" data-val="2">★</button>
        <button type="button" class="star-btn" data-val="3">★</button>
        <button type="button" class="star-btn" data-val="4">★</button>
        <button type="button" class="star-btn" data-val="5">★</button>
      </div>
      <label>한줄평</label>
      <input type="text" id="comment" style="width:100%;">
      <button class="submit" onclick="submitEval()">평가 등록</button>
    </div>
  </aside>
</main>

<div id="schedule-panel" style="display:none;">
  <div class="classroom-chips" id="classroom-chips"></div>
  <div class="schedule-status-bar" id="schedule-status-bar">
    <span class="status-dot" id="status-dot" style="background:var(--gray)"></span>
    <span class="status-text" id="status-text">강의실을 선택하세요</span>
  </div>
  <div class="schedule-list" id="schedule-list"></div>
</div>

const __origFetch = window.fetch.bind(window);
const __LS_KEY = 'outlet_map_evals';
const __STATUS_COLORS = {"사용가능":"#1f9d55","고장":"#e02424","점유":"#ff9f1c"};

function _applyLocalEvals(state) {
  const evals = JSON.parse(localStorage.getItem(__LS_KEY) || '[]');
  if (!evals.length) return;
  (state.devices || []).forEach(d => {
    const mine = evals.filter(e => e.device_id === d.device_id);
    if (!mine.length) return;
    const ordered = [...mine].sort((a, b) => b.eval_id - a.eval_id);
    d.status = ordered[0].status;
    d.color = __STATUS_COLORS[d.status] || '#9aa0a6';
    d.avg = Math.round(mine.reduce((s, e) => s + e.rating, 0) / mine.length * 10) / 10;
    d.count = mine.length;
    d.recent = ordered.slice(0, 5).map(e => ({rating: e.rating, comment: e.comment, created_at: e.created_at}));
  });
}

window.fetch = function(url, opts) {
  // 평가 등록 → localStorage 저장
  if (url === '/api/evaluation' && opts && opts.method === 'POST') {
    const data = JSON.parse(opts.body);
    const evals = JSON.parse(localStorage.getItem(__LS_KEY) || '[]');
    const ev = {
      eval_id: Date.now(),
      device_id: parseInt(data.device_id),
      status: data.status,
      rating: parseInt(data.rating),
      comment: data.comment || '',
      created_at: new Date().toISOString().slice(0, 16).replace('T', ' ')
    };
    evals.push(ev);
    localStorage.setItem(__LS_KEY, JSON.stringify(evals));
    return Promise.resolve({ok: true, json: () => Promise.resolve({ok: true, eval_id: ev.eval_id})});
  }
  // state.json 로드 후 로컬 평가 합산
  if (url === 'state.json') {
    return __origFetch(url, opts).then(r => r.json()).then(state => {
      _applyLocalEvals(state);
      return {ok: true, json: () => Promise.resolve(state)};
    });
  }
  if (url === '/api/classrooms') {
    return Promise.resolve({ok:true, json:()=>Promise.resolve(window.__SC__)});
  }
  const m = String(url).match(/^\/api\/classrooms\/(\d+)\/week$/);
  if (m) {
    return Promise.resolve({ok:true, json:()=>Promise.resolve(_computeWeek(parseInt(m[1])))});
  }
  return __origFetch(url, opts);
};

function _computeWeek(cid) {
  const now = new Date();
  const jsd = now.getDay();
  const today = jsd === 0 ? 6 : jsd - 1;
  const hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const cls = (window.__SC__ || []).find(c => c.classroom_id === cid);
  const all = (window.__SS__ || []).filter(s => s.classroom_id === cid);
  const todayS = all.filter(s => s.day_of_week === today);
  let status = '빈 강의실', cc = '', cp = '', nf = '';
  for (const s of todayS) {
    if (s.start_time <= hhmm && hhmm < s.end_time) { status='수업 중'; cc=s.course_name; cp=s.professor; }
  }
  if (status === '수업 중') {
    const sorted = [...todayS].sort((a,b)=>a.start_time.localeCompare(b.start_time));
    for (const s of sorted) { if (s.start_time <= hhmm && hhmm < s.end_time) nf = s.end_time; }
  }
  const week = [0,1,2,3,4].map(day => ({
    day, day_name: ['월','화','수','목','금'][day], is_today: day===today,
    schedules: all.filter(s=>s.day_of_week===day)
      .sort((a,b)=>a.start_time.localeCompare(b.start_time))
      .map(s=>({...s, is_now: day===today && s.start_time<=hhmm && hhmm<s.end_time}))
  }));
  return {classroom_id:cid, name:cls?cls.name:'', status, current_course:cc,
          current_professor:cp, next_free:nf, today, week};
}

const STATE_URL = window.OUTLET_MAP_STATE_URL || '/api/state';
const IMAGE_PREFIX = window.OUTLET_MAP_IMAGE_PREFIX || '/data/images/';
const READ_ONLY = Boolean(window.OUTLET_MAP_READ_ONLY);
let STATE = null, floorId = null, selId = null;

function imageUrl(name) {
  return `${IMAGE_PREFIX}${encodeURIComponent(name)}`;
}

async function loadState() {
  const r = await fetch(STATE_URL);
  STATE = await r.json();
  if (floorId === null && STATE.floors.length) floorId = STATE.floors[0].floor_id;
  if (!selId && devicesHere().length) selId = devicesHere()[0].device_id;
  renderBrand();
  renderTabs();
  renderStatusRow();
  renderMap();
  renderPanel();
  renderMode();
}

function devicesHere() {
  if (!STATE) return [];
  return STATE.devices.filter(d => d.floor_id === floorId);
}
function curFloor() {
  return STATE.floors.find(f => f.floor_id === floorId) || null;
}
function curDevice() {
  return STATE.devices.find(d => d.device_id === selId) || null;
}

function markerLabel(name) {
  return name
    .replace('앞 왼쪽 분전함', '앞 왼쪽')
    .replace('앞 오른쪽 분전함', '앞 오른쪽')
    .replace('뒷벽 왼쪽 콘센트 1', '뒤 왼①')
    .replace('뒷벽 왼쪽 콘센트 2', '뒤 왼②')
    .replace('뒷벽 오른쪽 콘센트 1', '뒤 오른①')
    .replace('뒷벽 오른쪽 콘센트 2', '뒤 오른②');
}

function renderBrand() {
  const img = document.getElementById('brandLogo');
  img.src = imageUrl(STATE.brand.logo);
}

function renderMode() {
  if (!READ_ONLY) return;
  document.getElementById('form').style.display = 'none';
  document.getElementById('syncInfo').textContent =
    STATE.generated_at ? `공개 보기 전용 · 기준 ${STATE.generated_at}` : '공개 보기 전용';
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  STATE.floors.forEach(f => {
    const b = document.createElement('button');
    b.className = 'tab' + (f.floor_id === floorId ? ' active' : '');
    b.textContent = f.name;
    b.onclick = () => {
      switchMainTab('map');
      floorId = f.floor_id;
      selId = devicesHere()[0]?.device_id || null;
      renderTabs();
      renderMap();
      renderPanel();
    };
    el.appendChild(b);
  });
  const floor = curFloor();
  document.getElementById('roomTitle').textContent =
    floor ? `${floor.name} 전원 지도` : '전원 지도';
}

function renderStatusRow() {
  const el = document.getElementById('statusRow');
  if (el.children.length) return;
  STATE.statuses.forEach((s, i) => {
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="radio" name="status" value="${s}" ${i===0?'checked':''}> ${s}`;
    el.appendChild(lab);
  });
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';
  const floor = curFloor();
  if (floor && floor.image_file) {
    map.style.backgroundImage = `url("${imageUrl(floor.image_file)}")`;
  } else {
    map.style.backgroundImage = 'none';
    map.innerHTML = '<div class="ph-note">도면 이미지가 아직 등록되지 않았습니다.</div>';
  }

  devicesHere().forEach(d => {
    const m = document.createElement('button');
    m.type = 'button';
    m.className = 'marker ' + (d.type === '콘센트' ? 'outlet' : 'aircon')
                 + (d.y > 0.82 ? ' low' : '')
                 + (d.device_id === selId ? ' selected' : '');
    m.style.left = (d.x * 100) + '%';
    m.style.top = (d.y * 100) + '%';
    m.setAttribute('aria-label', d.name);
    m.innerHTML = `<div class="dot" style="background:${d.color}"></div>
                   <div class="lbl">${markerLabel(d.name)}</div>`;
    m.onclick = (e) => {
      e.stopPropagation();
      selId = d.device_id;
      renderMap();
      renderPanel();
    };
    map.appendChild(m);
  });
}

function stars(avg) {
  if (avg === null) return '평가 없음';
  const full = Math.round(avg);
  return '★'.repeat(full) + '☆'.repeat(5 - full) + ` (${avg})`;
}

function renderPanel() {
  const panel = document.querySelector('.panel');
  const sum = document.getElementById('summary');
  const form = document.getElementById('form');
  const d = curDevice();
  if (!d) {
    sum.innerHTML = `<h2>위치를 선택하세요</h2>
      <p class="meta">도면의 마커를 누르면 해당 위치 상태가 표시됩니다.</p>`;
    form.classList.add('disabled');
    if (isMobile()) panel.classList.remove('collapsed', 'expanded');
    return;
  }

  form.classList.remove('disabled');
  const status = d.status || '미평가';
  const statusColor = d.color;
  let html = `<h2>${d.name}</h2>
    <div class="meta">${d.type} · 도면 좌표 ${Math.round(d.x * 100)}%, ${Math.round(d.y * 100)}%</div>
    <div class="status" style="color:${statusColor}">● ${status}</div>
    <div class="stars">${stars(d.avg)}</div>
    <div class="meta">평가 ${d.count}건</div>`;
  const cmts = d.recent.filter(e => e.comment);
  if (cmts.length) {
    html += '<div class="recent"><b>최근 한줄평</b>';
    cmts.forEach(e => html += `<div>${e.comment}</div>`);
    html += '</div>';
  }
  sum.innerHTML = html;
  if (isMobile()) {
    panel.classList.remove('expanded');
    panel.classList.add('collapsed');
  }
}


async function submitEval() {
  if (READ_ONLY) return;
  const d = curDevice();
  if (!d) return;
  const status = document.querySelector('input[name=status]:checked').value;
  const rating = parseInt(document.getElementById('rating').value, 10);
  const comment = document.getElementById('comment').value.trim();
  const r = await fetch('/api/evaluation', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({device_id: d.device_id, status, rating, comment})
  });
  const res = await r.json();
  if (!res.ok) {
    alert('오류: ' + res.error);
    return;
  }
  document.getElementById('comment').value = '';
  await loadState();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

  const mainEl = document.querySelector('main');
  const schedPanel = document.getElementById('schedule-panel');
  const schedBtn = document.getElementById('schedule-tab-btn');
  if (tab === 'schedule') {
    mainEl.style.display = 'none';

            </div>`
          ).join('')
        : '<div class="day-empty">수업 없음</div>';
      return `<div class="day-section">
        <div class="day-header${day.is_today ? ' today' : ''}">${dayLabel}</div>
        ${rows}
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('schedule-list').innerHTML =
      '<p class="no-schedule">시간표를 불러올 수 없습니다.</p>';
  }
}

initStarRating();
loadState();

</script>
</body>
</html>
