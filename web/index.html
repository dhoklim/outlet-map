<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Utility — 8706 전원 지도</title>
<style>
  :root {
    --ink: #202124;
    --muted: #6f756f;
    --line: #d8ddd2;
    --paper: #fbfaf4;
    --panel: #ffffff;
    --accent: #f0c84b;
    --accent-dark: #252523;
    --green: #1f9d55;
    --red: #e02424;
    --orange: #ff9f1c;
    --gray: #9aa0a6;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background: #ebe8dd;
    font-family: "Avenir Next", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: rgba(251, 250, 244, .96);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 220px;
  }
  .brand img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 8px;
  }
  .brand-title {
    font-weight: 800;
    letter-spacing: .02em;
    line-height: 1;
  }
  .brand-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 3px;
  }
  #tabs {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }
  .tab {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 7px 12px;
    border-radius: 8px;
  }
  .tab.active {
    color: #fff;
    background: var(--accent-dark);
    border-color: var(--accent-dark);
  }
  .search {
    display: flex;
    gap: 7px;
    margin-left: auto;
  }
  input[type=text] {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    min-width: 180px;
    background: #fff;
  }
  .search button, .ghost {
    border: 1px solid var(--accent-dark);
    border-radius: 8px;
    padding: 7px 12px;
    background: var(--accent-dark);
    color: #fff;
  }
  .ghost {
    background: #fff;
    color: var(--accent-dark);
  }
  .sync {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 18px;
    height: calc(100vh - 65px);
    padding: 18px;
  }
  .map-stage {
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
  }
  .room-heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
  }
  .room-heading h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.1;
  }
  .room-heading p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .key {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .map-shell {
    display: grid;
    place-items: center;
    min-height: 0;
  }
  .map {
    position: relative;
    width: min(100%, calc((100vh - 150px) * 1.432));
    aspect-ratio: 2388 / 1668;
    background: var(--paper) center / 100% 100% no-repeat;
    border: 1px solid rgba(32, 33, 36, .18);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 18px 46px rgba(32, 33, 36, .13);
  }
  .map.editing { cursor: crosshair; }
  .map::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .ph-note {
    position: absolute;
    inset: auto 0 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 4;
    border: none;
    background: transparent;
    padding: 0;
  }
  .dot {
    width: 22px;
    height: 22px;
    border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .marker.outlet .dot { border-radius: 999px; }
  .marker.aircon .dot { border-radius: 5px; }
  .marker.selected .dot {
    width: 28px;
    height: 28px;
    border-color: var(--accent-dark);
    outline: 3px solid var(--accent);
  }
  .marker .lbl {
    position: absolute;
    left: 50%;
    top: 28px;
    transform: translateX(-50%);
    padding: 3px 6px;
    border-radius: 6px;
    color: var(--ink);
    background: rgba(255,255,255,.84);
    font-size: 11px;
    line-height: 1.25;
    white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.1);
  }
  .marker.low .lbl {
    top: auto;
    bottom: 30px;
  }

  .panel {
    min-height: 0;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 10px 30px rgba(32, 33, 36, .08);
  }
  .hero-photo {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: #f0f0ec;
  }
  .panel h2 {
    margin: 12px 0 2px;
    font-size: 20px;
  }
  .meta {
    color: var(--muted);
    font-size: 13px;
  }
  .status {
    margin-top: 10px;
    font-weight: 800;
  }
  .stars {
    margin-top: 4px;
    letter-spacing: .08em;
  }
  .recent {
    margin: 12px 0;
    padding: 10px;
    border-radius: 8px;
    background: #f7f5eb;
    font-size: 13px;
  }
  .recent div { margin-top: 4px; }
  hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 14px 0;
  }
  .form.disabled {
    opacity: .42;
    pointer-events: none;
  }
  .form label {
    display: block;
    margin: 8px 0 3px;
    color: var(--muted);
    font-size: 13px;
  }
  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .row label {
    margin: 0;
    color: var(--ink);
  }
  .submit {
    width: 100%;
    margin-top: 12px;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    color: var(--accent-dark);
    background: var(--accent);
    font-weight: 800;
  }
  .photo-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
    margin-top: 14px;
  }
  .photo-strip img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--line);
  }

  /* --- 모바일 전용 컴포넌트 (데스크톱에서는 숨김) --- */
  .sheet-handle {
    display: none;
    width: 40px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 0 auto 12px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .star-row {
    display: none;
    gap: 2px;
    align-items: center;
  }
  .star-btn {
    border: none; background: none;
    font-size: 28px; color: #ddd;
    padding: 2px 4px; cursor: pointer;
    line-height: 1;
    transition: color .1s;
  }
  .star-btn.on { color: var(--accent); }

  .modal-bg {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(32, 33, 36, .38);
    padding: 18px;
  }
  .modal {
    width: min(320px, 100%);
    background: #fff;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,.22);
  }
  .modal h3 { margin: 0 0 12px; }

  @media (max-width: 880px) {
    header { align-items: flex-start; flex-direction: column; }
    .search { margin-left: 0; width: 100%; }
    .search input { flex: 1; min-width: 0; }
    main {
      grid-template-columns: 1fr;
      height: auto;
      min-height: calc(100vh - 65px);
    }
    .map {
      width: 100%;
    }
    .panel {
      overflow: visible;
    }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img id="brandLogo" alt="Utility 로고">
    <div>
      <div class="brand-title">Utility</div>
      <div class="brand-subtitle">콘센트와 냉방 위치 지도</div>
    </div>
  </div>
  <div id="tabs"></div>
  <label class="sync"><input type="checkbox" id="edit"> 편집 모드</label>
  <div class="search">
    <input type="text" id="search" placeholder="예: 칠판, 창가, 에어컨">
    <button onclick="doSearch()">찾기</button>
  </div>
  <span class="sync" id="syncInfo">CSV와 3초마다 동기화</span>
</header>

<main>
  <section class="map-stage">
    <div class="room-heading">
      <div>
        <h1 id="roomTitle">8706-1707호 전원 지도</h1>
        <p>사진으로 확인한 콘센트와 에어컨 위치를 도면 위에 표시했습니다.</p>
      </div>
      <div class="legend">
        <span class="key"><span class="swatch" style="background:var(--green)"></span>사용가능</span>
        <span class="key"><span class="swatch" style="background:var(--red)"></span>고장</span>
        <span class="key"><span class="swatch" style="background:var(--orange)"></span>점유</span>
        <span class="key"><span class="swatch" style="background:var(--gray)"></span>미평가</span>
      </div>
    </div>
    <div class="map-shell">
      <div id="map" class="map" aria-label="강의실 콘센트 지도"></div>
    </div>
  </section>

  <aside class="panel">
    <div class="sheet-handle"></div>
    <div id="summary"></div>
    <hr>
    <div id="form" class="form disabled">
      <b>이 위치 평가하기</b>
      <label>상태</label>
      <div class="row" id="statusRow"></div>
      <label>별점</label>
      <div class="row">
        <select id="rating">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option selected>5</option>
        </select>
        <span class="meta">1~5</span>
      </div>
      <div id="starRating" class="star-row">
        <button type="button" class="star-btn" data-val="1">★</button>
        <button type="button" class="star-btn" data-val="2">★</button>
        <button type="button" class="star-btn" data-val="3">★</button>
        <button type="button" class="star-btn" data-val="4">★</button>
        <button type="button" class="star-btn" data-val="5">★</button>
      </div>
      <label>한줄평</label>
      <input type="text" id="comment" style="width:100%;">
      <button class="submit" onclick="submitEval()">평가 등록</button>
    </div>
    <div class="photo-strip" id="photoStrip"></div>
  </aside>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>새 기기 등록</h3>
    <label>종류</label>
    <div class="row" id="typeRow"></div>
    <label>이름</label>
    <input type="text" id="newName" style="width:100%;">
    <button class="submit" onclick="submitDevice()">저장</button>
    <button class="ghost" onclick="closeModal()" style="width:100%;margin-top:7px;">취소</button>
  </div>
</div>

<script>
const STATE_URL = window.OUTLET_MAP_STATE_URL || '/api/state';
const IMAGE_PREFIX = window.OUTLET_MAP_IMAGE_PREFIX || '/data/images/';
const READ_ONLY = Boolean(window.OUTLET_MAP_READ_ONLY);
let STATE = null, floorId = null, selId = null;
let pendingXY = null;

function imageUrl(name) {
  return `${IMAGE_PREFIX}${encodeURIComponent(name)}`;
}

async function loadState() {
  const r = await fetch(STATE_URL);
  STATE = await r.json();
  if (floorId === null && STATE.floors.length) floorId = STATE.floors[0].floor_id;
  if (!selId && devicesHere().length) selId = devicesHere()[0].device_id;
  renderBrand();
  renderTabs();
  renderStatusRow();
  renderTypeRow();
  renderMap();
  renderPanel();
  renderMode();
}

function devicesHere() {
  if (!STATE) return [];
  return STATE.devices.filter(d => d.floor_id === floorId);
}
function curFloor() {
  return STATE.floors.find(f => f.floor_id === floorId) || null;
}
function curDevice() {
  return STATE.devices.find(d => d.device_id === selId) || null;
}

function markerLabel(name) {
  return name
    .replace('칠판 왼쪽 콘센트', '칠판 왼쪽')
    .replace('칠판 오른쪽 콘센트', '칠판 오른쪽')
    .replace('왼쪽 출입문 콘센트', '좌문')
    .replace('왼쪽 출입문 안쪽 콘센트', '좌안')
    .replace('오른쪽 출입문 왼편 콘센트', '우좌')
    .replace('오른쪽 출입문 오른편 콘센트', '우우');
}

function renderBrand() {
  const img = document.getElementById('brandLogo');
  img.src = imageUrl(STATE.brand.logo);
}

function renderMode() {
  if (!READ_ONLY) return;
  document.querySelector('label.sync').style.display = 'none';
  document.getElementById('form').style.display = 'none';
  document.getElementById('syncInfo').textContent =
    STATE.generated_at ? `공개 보기 전용 · 기준 ${STATE.generated_at}` : '공개 보기 전용';
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  STATE.floors.forEach(f => {
    const b = document.createElement('button');
    b.className = 'tab' + (f.floor_id === floorId ? ' active' : '');
    b.textContent = f.name;
    b.onclick = () => {
      floorId = f.floor_id;
      selId = devicesHere()[0]?.device_id || null;
      renderTabs();
      renderMap();
      renderPanel();
    };
    el.appendChild(b);
  });
  const floor = curFloor();
  document.getElementById('roomTitle').textContent =
    floor ? `${floor.name} 전원 지도` : '전원 지도';
}

function renderStatusRow() {
  const el = document.getElementById('statusRow');
  if (el.children.length) return;
  STATE.statuses.forEach((s, i) => {
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="radio" name="status" value="${s}" ${i===0?'checked':''}> ${s}`;
    el.appendChild(lab);
  });
}

function renderTypeRow() {
  const el = document.getElementById('typeRow');
  if (el.children.length) return;
  STATE.device_types.forEach((t, i) => {
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="radio" name="ntype" value="${t}" ${i===0?'checked':''}> ${t}`;
    el.appendChild(lab);
  });
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';
  const floor = curFloor();
  if (floor && floor.image_file) {
    map.style.backgroundImage = `url("${imageUrl(floor.image_file)}")`;
  } else {
    map.style.backgroundImage = 'none';
    map.innerHTML = '<div class="ph-note">도면 이미지가 아직 등록되지 않았습니다.</div>';
  }

  devicesHere().forEach(d => {
    const m = document.createElement('button');
    m.type = 'button';
    m.className = 'marker ' + (d.type === '콘센트' ? 'outlet' : 'aircon')
                 + (d.y > 0.82 ? ' low' : '')
                 + (d.device_id === selId ? ' selected' : '');
    m.style.left = (d.x * 100) + '%';
    m.style.top = (d.y * 100) + '%';
    m.setAttribute('aria-label', d.name);
    m.innerHTML = `<div class="dot" style="background:${d.color}"></div>
                   <div class="lbl">${markerLabel(d.name)}</div>`;
    m.onclick = (e) => {
      e.stopPropagation();
      selId = d.device_id;
      renderMap();
      renderPanel();
    };
    map.appendChild(m);
  });
}

function stars(avg) {
  if (avg === null) return '평가 없음';
  const full = Math.round(avg);
  return '★'.repeat(full) + '☆'.repeat(5 - full) + ` (${avg})`;
}

function renderPanel() {
  const sum = document.getElementById('summary');
  const form = document.getElementById('form');
  const d = curDevice();
  if (!d) {
    sum.innerHTML = `<img class="hero-photo" src="${imageUrl('room_8706_door.jpeg')}" alt="8706 강의실 표지">
      <h2>위치를 선택하세요</h2>
      <p class="meta">도면의 마커를 누르면 해당 위치 사진과 상태가 표시됩니다.</p>`;
    form.classList.add('disabled');
    renderPhotoStrip();
    return;
  }

  form.classList.remove('disabled');
  const photo = d.photo || 'room_8706_door.jpeg';
  const status = d.status || '미평가';
  const statusColor = d.color;
  let html = `<img class="hero-photo" src="${imageUrl(photo)}" alt="${d.name} 참고 사진">
    <h2>${d.name}</h2>
    <div class="meta">${d.type} · 도면 좌표 ${Math.round(d.x * 100)}%, ${Math.round(d.y * 100)}%</div>
    <div class="status" style="color:${statusColor}">● ${status}</div>
    <div class="stars">${stars(d.avg)}</div>
    <div class="meta">평가 ${d.count}건</div>`;
  const cmts = d.recent.filter(e => e.comment);
  if (cmts.length) {
    html += '<div class="recent"><b>최근 한줄평</b>';
    cmts.forEach(e => html += `<div>${e.comment}</div>`);
    html += '</div>';
  }
  sum.innerHTML = html;
  renderPhotoStrip(photo);
}

function renderPhotoStrip(activePhoto = '') {
  const el = document.getElementById('photoStrip');
  const names = [
    'room_8706_door.jpeg',
    'room_front_wall.jpeg',
    'room_windows_overview.jpeg',
    'room_outlet_wall.jpeg',
    'room_window_column.jpeg',
    'utility_icon.png',
  ];
  el.innerHTML = names.map(name =>
    `<img src="${imageUrl(name)}" alt="강의실 참고 사진" style="${name === activePhoto ? 'outline:3px solid var(--accent);' : ''}">`
  ).join('');
}

async function submitEval() {
  if (READ_ONLY) return;
  const d = curDevice();
  if (!d) return;
  const status = document.querySelector('input[name=status]:checked').value;
  const rating = parseInt(document.getElementById('rating').value, 10);
  const comment = document.getElementById('comment').value.trim();
  const r = await fetch('/api/evaluation', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({device_id: d.device_id, status, rating, comment})
  });
  const res = await r.json();
  if (!res.ok) {
    alert('오류: ' + res.error);
    return;
  }
  document.getElementById('comment').value = '';
  await loadState();
}

function doSearch() {
  const q = document.getElementById('search').value.trim();
  if (!q) return;
  const hit = devicesHere().find(d => d.name.includes(q) || d.type.includes(q));
  if (hit) {
    selId = hit.device_id;
    renderMap();
    renderPanel();
  } else {
    alert(`'${q}' 와(과) 일치하는 기기가 이 방에 없습니다.`);
  }
}

document.getElementById('search').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('map').addEventListener('click', (e) => {
  if (READ_ONLY) return;
  if (!document.getElementById('edit').checked) return;
  const rect = e.currentTarget.getBoundingClientRect();
  pendingXY = {
    x: (e.clientX - rect.left) / rect.width,
    y: (e.clientY - rect.top) / rect.height,
  };
  document.getElementById('newName').value = '';
  document.getElementById('modalBg').style.display = 'flex';
});
document.getElementById('edit').addEventListener('change', (e) => {
  document.getElementById('map').classList.toggle('editing', e.target.checked);
});
function closeModal() {
  document.getElementById('modalBg').style.display = 'none';
  pendingXY = null;
}

async function submitDevice() {
  if (READ_ONLY) return;
  const name = document.getElementById('newName').value.trim();
  const type = document.querySelector('input[name=ntype]:checked').value;
  if (!name) {
    alert('이름을 입력하세요.');
    return;
  }
  const r = await fetch('/api/device', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({floor_id: floorId, type, name, x: pendingXY.x, y: pendingXY.y})
  });
  const res = await r.json();
  if (!res.ok) {
    alert('오류: ' + res.error);
    return;
  }
  closeModal();
  await loadState();
}

loadState();
setInterval(loadState, 3000);
</script>
</body>
</html>
