<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Utility — 전원 지도</title>
<style>
  :root {
    --ink: #202124;
    --muted: #6f756f;
    --line: #d8ddd2;
    --paper: #fbfaf4;
    --panel: #ffffff;
    --accent: #f0c84b;
    --accent-dark: #252523;
    --green: #1f9d55;
    --red: #e02424;
    --orange: #ff9f1c;
    --gray: #9aa0a6;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background: #ebe8dd;
    font-family: "Avenir Next", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: rgba(251, 250, 244, .96);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 220px;
  }
  .brand img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 8px;
  }
  .brand-title {
    font-weight: 800;
    letter-spacing: .02em;
    line-height: 1;
  }
  .brand-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 3px;
  }
  #tabs {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }
  .tab {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 7px 12px;
    border-radius: 8px;
  }
  .tab.active {
    color: #fff;
    background: var(--accent-dark);
    border-color: var(--accent-dark);
  }
  .search {
    display: flex;
    gap: 7px;
    margin-left: auto;
  }
  input[type=text] {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    min-width: 180px;
    background: #fff;
  }
  .search button, .ghost {
    border: 1px solid var(--accent-dark);
    border-radius: 8px;
    padding: 7px 12px;
    background: var(--accent-dark);
    color: #fff;
  }
  .ghost {
    background: #fff;
    color: var(--accent-dark);
  }
  .sync {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 18px;
    height: calc(100vh - 65px);
    padding: 18px;
  }
  .map-stage {
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
  }
  .room-heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
  }
  .room-heading h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.1;
  }
  .room-heading p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .key {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .map-shell {
    display: grid;
    place-items: center;
    min-height: 0;
  }
  .map {
    position: relative;
    width: min(100%, calc((100vh - 150px) * 1.432));
    aspect-ratio: 2798 / 2056;
    background: var(--paper) center / 100% 100% no-repeat;
    border: 1px solid rgba(32, 33, 36, .18);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 18px 46px rgba(32, 33, 36, .13);
  }
  .map.editing { cursor: crosshair; }
  .map::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .ph-note {
    position: absolute;
    inset: auto 0 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 4;
    border: none;
    background: transparent;
    padding: 0;
  }
  .dot {
    width: 22px;
    height: 22px;
    border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .marker.outlet .dot { border-radius: 999px; }
  .marker.aircon .dot { border-radius: 5px; }
  .marker.selected .dot {
    width: 28px;
    height: 28px;
    border-color: var(--accent-dark);
    outline: 3px solid var(--accent);
  }
  .marker .lbl {
    position: absolute;
    left: 50%;
    top: 28px;
    transform: translateX(-50%);
    padding: 3px 6px;
    border-radius: 6px;
    color: var(--ink);
    background: rgba(255,255,255,.84);
    font-size: 11px;
    line-height: 1.25;
    white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.1);
  }
  .marker.low .lbl {
    top: auto;
    bottom: 30px;
  }

  .panel {
    min-height: 0;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 10px 30px rgba(32, 33, 36, .08);
  }
  .hero-photo {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: #f0f0ec;
  }
  .panel h2 {
    margin: 12px 0 2px;
    font-size: 20px;
  }
  .meta {
    color: var(--muted);
    font-size: 13px;
  }
  .status {
    margin-top: 10px;
    font-weight: 800;
  }
  .stars {
    margin-top: 4px;
    letter-spacing: .08em;
  }
  .recent {
    margin: 12px 0;
    padding: 10px;
    border-radius: 8px;
    background: #f7f5eb;
    font-size: 13px;
  }
  .recent div { margin-top: 4px; }
  hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 14px 0;
  }
  .form.disabled {
    opacity: .42;
    pointer-events: none;
  }
  .form label {
    display: block;
    margin: 8px 0 3px;
    color: var(--muted);
    font-size: 13px;
  }
  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .row label {
    margin: 0;
    color: var(--ink);
  }
  .submit {
    width: 100%;
    margin-top: 12px;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    color: var(--accent-dark);
    background: var(--accent);
    font-weight: 800;
  }
  .photo-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
    margin-top: 14px;
  }
  .photo-strip img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--line);
  }

  /* --- 모바일 전용 컴포넌트 (데스크톱에서는 숨김) --- */
  .sheet-handle {
    display: none;
    width: 40px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 0 auto 12px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .star-row {
    display: none;
    gap: 2px;
    align-items: center;
  }
  .star-btn {
    border: none; background: none;
    font-size: 28px; color: #ddd;
    padding: 2px 4px; cursor: pointer;
    line-height: 1;
    transition: color .1s;
  }
  .star-btn.on { color: var(--accent); }

  .modal-bg {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(32, 33, 36, .38);
    padding: 18px;
  }
  .modal {
    width: min(320px, 100%);
    background: #fff;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,.22);
  }
  .modal h3 { margin: 0 0 12px; }

  /* ── 시간표 탭 ── */
  #schedule-panel {
    padding: 18px;
    max-width: 600px;
    margin: 0 auto;
  }
  .classroom-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .classroom-chip {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    white-space: nowrap;
  }
  .classroom-chip.active {
    background: var(--accent-dark);
    color: var(--accent);
    border-color: var(--accent-dark);
  }
  .schedule-status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
    border: 1px solid var(--line);
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-text { font-weight: 700; font-size: 14px; }
  .status-next { color: var(--muted); font-size: 13px; }
  .schedule-list { display: flex; flex-direction: column; gap: 8px; }
  .schedule-row {
    background: var(--panel);
    border-radius: 10px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .schedule-row.now { border-color: var(--green); background: #f0faf4; }
  .sched-time {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    min-width: 110px;
    margin-top: 2px;
  }
  .sched-course {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sched-prof { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .now-badge {
    background: var(--green);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
  }
  .no-schedule { color: var(--muted); text-align: center; padding: 40px 0; }
  @media (max-width: 640px) {
    .sched-columns { flex-direction: column; gap: 16px; }
  }
  .day-section { margin-bottom: 12px; }
  .day-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    padding: 6px 4px 4px;
    text-transform: uppercase;
  }
  .day-header.today {
    color: var(--accent-dark);
    background: var(--accent);
    padding: 4px 8px;
    border-radius: 6px;
    margin: 0 -4px;
  }
  .day-empty { color: var(--muted); font-size: 13px; padding: 8px 4px; }

  @media (max-width: 880px) {
    /* ── 헤더 슬림화 ── */
    header {
      flex-wrap: nowrap;
      height: 48px;
      padding: 0 10px;
      gap: 8px;
      overflow: hidden;
    }
    .brand img, .brand-subtitle { display: none; }
    .brand { min-width: auto; gap: 0; }
    .brand-title { font-size: 13px; }
    #tabs { flex-wrap: nowrap; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .tab { padding: 5px 8px; font-size: 12px; white-space: nowrap; }
    label.sync { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
    .search { gap: 4px; flex-shrink: 0; }
    .search input { min-width: 80px; font-size: 13px; padding: 5px 8px; }
    .search button { padding: 5px 8px; font-size: 12px; }
    #syncInfo { display: none; }

    /* ── 지도 전체화면 ── */
    main { display: block; height: calc(100vh - 48px); padding: 0; }
    .map-stage { display: flex; flex-direction: column; height: 100%; }
    .room-heading { display: none; }
    .map-shell { flex: 1; min-height: 0; display: block; }
    .map {
      width: 100%; height: 100%;
      border-radius: 0;
      border-left: none; border-right: none;
      aspect-ratio: unset;
    }

    /* ── 마커 터치 영역 확대 ── */
    .dot { width: 28px; height: 28px; }
    .marker.selected .dot { width: 34px; height: 34px; }

    /* ── 바텀 시트 ── */
    .sheet-handle { display: block; }
    .panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: auto;
      max-height: 65vh;
      border-radius: 16px 16px 0 0;
      border: none;
      box-shadow: 0 -4px 24px rgba(32,33,36,.18);
      transform: translateY(100%);
      transition: transform .28s ease, max-height .28s ease;
      overflow-y: hidden;
      z-index: 100;
      padding: 8px 16px 24px;
    }
    .panel.collapsed {
      transform: translateY(0);
      max-height: 148px;
      overflow: hidden;
      cursor: pointer;
    }
    .panel.expanded {
      transform: translateY(0);
      max-height: 65vh;
      overflow-y: auto;
      cursor: default;
    }

    /* ── 별점 탭 ── */
    #starRating { display: flex !important; }
    #rating, #rating + .meta { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img id="brandLogo" alt="Utility 로고">
    <div>
      <div class="brand-title">Utility</div>
      <div class="brand-subtitle">콘센트와 냉방 위치 지도</div>
    </div>
  </div>
  <div id="tabs"></div>
  <button id="schedule-tab-btn" class="tab" onclick="switchMainTab('schedule')">시간표</button>
  <label class="sync"><input type="checkbox" id="edit"> 편집 모드</label>
  <div class="search">
    <input type="text" id="search" placeholder="예: 칠판, 창가, 에어컨">
    <button onclick="doSearch()">찾기</button>
  </div>
  <span class="sync" id="syncInfo">3초마다 동기화</span>
</header>

<main>
  <section class="map-stage">
    <div class="room-heading">
      <div>
        <h1 id="roomTitle">전원 지도</h1>
        <p>사진으로 확인한 콘센트와 에어컨 위치를 도면 위에 표시했습니다.</p>
      </div>
      <div class="legend">
        <span class="key"><span class="swatch" style="background:var(--green)"></span>사용가능</span>
        <span class="key"><span class="swatch" style="background:var(--red)"></span>고장</span>
        <span class="key"><span class="swatch" style="background:var(--orange)"></span>점유</span>
        <span class="key"><span class="swatch" style="background:var(--gray)"></span>미평가</span>
      </div>
    </div>
    <div class="map-shell">
      <div id="map" class="map" aria-label="강의실 콘센트 지도"></div>
    </div>
  </section>

  <aside class="panel">
    <div class="sheet-handle"></div>
    <div id="summary"></div>
    <hr>
    <div id="form" class="form disabled">
      <b>이 위치 평가하기</b>
      <label>상태</label>
      <div class="row" id="statusRow"></div>
      <label>별점</label>
      <div class="row">
        <select id="rating">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option selected>5</option>
        </select>
        <span class="meta">1~5</span>
      </div>
      <div id="starRating" class="star-row">
        <button type="button" class="star-btn" data-val="1">★</button>
        <button type="button" class="star-btn" data-val="2">★</button>
        <button type="button" class="star-btn" data-val="3">★</button>
        <button type="button" class="star-btn" data-val="4">★</button>
        <button type="button" class="star-btn" data-val="5">★</button>
      </div>
      <label>한줄평</label>
      <input type="text" id="comment" style="width:100%;">
      <button class="submit" onclick="submitEval()">평가 등록</button>
    </div>
    <div class="photo-strip" id="photoStrip"></div>
  </aside>
</main>

<div id="schedule-panel" style="display:none;">
  <div class="classroom-chips" id="classroom-chips"></div>
  <div class="schedule-status-bar" id="schedule-status-bar">
    <span class="status-dot" id="status-dot" style="background:var(--gray)"></span>
    <span class="status-text" id="status-text">강의실을 선택하세요</span>
  </div>
  <div class="schedule-list" id="schedule-list"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>새 기기 등록</h3>
    <label>종류</label>
    <div class="row" id="typeRow"></div>
    <label>이름</label>
    <input type="text" id="newName" style="width:100%;">
    <button class="submit" onclick="submitDevice()">저장</button>
    <button class="ghost" onclick="closeModal()" style="width:100%;margin-top:7px;">취소</button>
  </div>
</div>

<script>
const isMobile = () => window.matchMedia('(max-width: 880px)').matches;

function updateStarDisplay(val) {
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('on', parseInt(btn.dataset.val, 10) <= val);
  });
}

function initStarRating() {
  updateStarDisplay(5); // select 기본값 5에 맞춤
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation(); // 바텀시트 collapse 방지
      const val = parseInt(btn.dataset.val, 10);
      document.getElementById('rating').value = val;
      updateStarDisplay(val);
    });
  });
}
const STATE_URL = window.OUTLET_MAP_STATE_URL || '/api/state';
const IMAGE_PREFIX = window.OUTLET_MAP_IMAGE_PREFIX || '/data/images/';
const READ_ONLY = Boolean(window.OUTLET_MAP_READ_ONLY);
let STATE = null, floorId = null, selId = null;
let pendingXY = null;

function imageUrl(name) {
  return `${IMAGE_PREFIX}${encodeURIComponent(name)}`;
}

async function loadState() {
  const r = await fetch(STATE_URL);
  STATE = await r.json();
  if (floorId === null && STATE.floors.length) floorId = STATE.floors[0].floor_id;
  if (!selId && devicesHere().length) selId = devicesHere()[0].device_id;
  renderBrand();
  renderTabs();
  renderStatusRow();
  renderTypeRow();
  renderMap();
  renderPanel();
  renderMode();
}

function devicesHere() {
  if (!STATE) return [];
  return STATE.devices.filter(d => d.floor_id === floorId);
}
function curFloor() {
  return STATE.floors.find(f => f.floor_id === floorId) || null;
}
function curDevice() {
  return STATE.devices.find(d => d.device_id === selId) || null;
}

function markerLabel(name) {
  return name
    .replace('앞 왼쪽 분전함', '앞 왼쪽')
    .replace('앞 오른쪽 분전함', '앞 오른쪽')
    .replace('뒷벽 왼쪽 콘센트 1', '뒤 왼①')
    .replace('뒷벽 왼쪽 콘센트 2', '뒤 왼②')
    .replace('뒷벽 오른쪽 콘센트 1', '뒤 오른①')
    .replace('뒷벽 오른쪽 콘센트 2', '뒤 오른②');
}

function renderBrand() {
  const img = document.getElementById('brandLogo');
  img.src = imageUrl(STATE.brand.logo);
}

function renderMode() {
  if (!READ_ONLY) return;
  document.querySelector('label.sync').style.display = 'none';
  document.getElementById('form').style.display = 'none';
  document.getElementById('syncInfo').textContent =
    STATE.generated_at ? `공개 보기 전용 · 기준 ${STATE.generated_at}` : '공개 보기 전용';
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  STATE.floors.forEach(f => {
    const b = document.createElement('button');
    b.className = 'tab' + (f.floor_id === floorId ? ' active' : '');
    b.textContent = f.name;
    b.onclick = () => {
      switchMainTab('map');
      floorId = f.floor_id;
      selId = devicesHere()[0]?.device_id || null;
      renderTabs();
      renderMap();
      renderPanel();
    };
    el.appendChild(b);
  });
  const floor = curFloor();
  document.getElementById('roomTitle').textContent =
    floor ? `${floor.name} 전원 지도` : '전원 지도';
}

function renderStatusRow() {
  const el = document.getElementById('statusRow');
  if (el.children.length) return;
  STATE.statuses.forEach((s, i) => {
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="radio" name="status" value="${s}" ${i===0?'checked':''}> ${s}`;
    el.appendChild(lab);
  });
}

function renderTypeRow() {
  const el = document.getElementById('typeRow');
  if (el.children.length) return;
  STATE.device_types.forEach((t, i) => {
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="radio" name="ntype" value="${t}" ${i===0?'checked':''}> ${t}`;
    el.appendChild(lab);
  });
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';
  const floor = curFloor();
  if (floor && floor.image_file) {
    map.style.backgroundImage = `url("${imageUrl(floor.image_file)}")`;
  } else {
    map.style.backgroundImage = 'none';
    map.innerHTML = '<div class="ph-note">도면 이미지가 아직 등록되지 않았습니다.</div>';
  }

  devicesHere().forEach(d => {
    const m = document.createElement('button');
    m.type = 'button';
    m.className = 'marker ' + (d.type === '콘센트' ? 'outlet' : 'aircon')
                 + (d.y > 0.82 ? ' low' : '')
                 + (d.device_id === selId ? ' selected' : '');
    m.style.left = (d.x * 100) + '%';
    m.style.top = (d.y * 100) + '%';
    m.setAttribute('aria-label', d.name);
    m.innerHTML = `<div class="dot" style="background:${d.color}"></div>
                   <div class="lbl">${markerLabel(d.name)}</div>`;
    m.onclick = (e) => {
      e.stopPropagation();
      selId = d.device_id;
      renderMap();
      renderPanel();
    };
    map.appendChild(m);
  });
}

function stars(avg) {
  if (avg === null) return '평가 없음';
  const full = Math.round(avg);
  return '★'.repeat(full) + '☆'.repeat(5 - full) + ` (${avg})`;
}

function renderPanel() {
  const panel = document.querySelector('.panel');
  const sum = document.getElementById('summary');
  const form = document.getElementById('form');
  const d = curDevice();
  if (!d) {
    sum.innerHTML = `<img class="hero-photo" src="${imageUrl('classroom_map.jpeg')}" alt="강의실 전원 지도">
      <h2>위치를 선택하세요</h2>
      <p class="meta">도면의 마커를 누르면 해당 위치 사진과 상태가 표시됩니다.</p>`;
    form.classList.add('disabled');
    renderPhotoStrip();
    if (isMobile()) panel.classList.remove('collapsed', 'expanded');
    return;
  }

  form.classList.remove('disabled');
  const photo = d.photo || 'classroom_map.jpeg';
  const status = d.status || '미평가';
  const statusColor = d.color;
  let html = `<img class="hero-photo" src="${imageUrl(photo)}" alt="${d.name} 참고 사진">
    <h2>${d.name}</h2>
    <div class="meta">${d.type} · 도면 좌표 ${Math.round(d.x * 100)}%, ${Math.round(d.y * 100)}%</div>
    <div class="status" style="color:${statusColor}">● ${status}</div>
    <div class="stars">${stars(d.avg)}</div>
    <div class="meta">평가 ${d.count}건</div>`;
  const cmts = d.recent.filter(e => e.comment);
  if (cmts.length) {
    html += '<div class="recent"><b>최근 한줄평</b>';
    cmts.forEach(e => html += `<div>${e.comment}</div>`);
    html += '</div>';
  }
  sum.innerHTML = html;
  renderPhotoStrip(photo);
  if (isMobile()) {
    panel.classList.remove('expanded');
    panel.classList.add('collapsed');
  }
}

function renderPhotoStrip(activePhoto = '') {
  const el = document.getElementById('photoStrip');
  const names = [
    'classroom_map.jpeg',
    'room_front_wall.jpeg',
    'room_windows_overview.jpeg',
    'room_outlet_wall.jpeg',
    'room_window_column.jpeg',
  ];
  el.innerHTML = names.map(name =>
    `<img src="${imageUrl(name)}" alt="강의실 참고 사진" style="${name === activePhoto ? 'outline:3px solid var(--accent);' : ''}">`
  ).join('');
}

async function submitEval() {
  if (READ_ONLY) return;
  const d = curDevice();
  if (!d) return;
  const status = document.querySelector('input[name=status]:checked').value;
  const rating = parseInt(document.getElementById('rating').value, 10);
  const comment = document.getElementById('comment').value.trim();
  const r = await fetch('/api/evaluation', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({device_id: d.device_id, status, rating, comment})
  });
  const res = await r.json();
  if (!res.ok) {
    alert('오류: ' + res.error);
    return;
  }
  document.getElementById('comment').value = '';
  await loadState();
}

function doSearch() {
  const q = document.getElementById('search').value.trim();
  if (!q) return;
  const hit = devicesHere().find(d => d.name.includes(q) || d.type.includes(q));
  if (hit) {
    selId = hit.device_id;
    renderMap();
    renderPanel();
  } else {
    alert(`'${q}' 와(과) 일치하는 기기가 이 방에 없습니다.`);
  }
}

document.getElementById('search').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('map').addEventListener('click', (e) => {
  if (READ_ONLY) return;
  if (!document.getElementById('edit').checked) return;
  const rect = e.currentTarget.getBoundingClientRect();
  pendingXY = {
    x: (e.clientX - rect.left) / rect.width,
    y: (e.clientY - rect.top) / rect.height,
  };
  document.getElementById('newName').value = '';
  document.getElementById('modalBg').style.display = 'flex';
});
document.getElementById('edit').addEventListener('change', (e) => {
  document.getElementById('map').classList.toggle('editing', e.target.checked);
});
function closeModal() {
  document.getElementById('modalBg').style.display = 'none';
  pendingXY = null;
}

async function submitDevice() {
  if (READ_ONLY) return;
  const name = document.getElementById('newName').value.trim();
  const type = document.querySelector('input[name=ntype]:checked').value;
  if (!name) {
    alert('이름을 입력하세요.');
    return;
  }
  const r = await fetch('/api/device', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({floor_id: floorId, type, name, x: pendingXY.x, y: pendingXY.y})
  });
  const res = await r.json();
  if (!res.ok) {
    alert('오류: ' + res.error);
    return;
  }
  closeModal();
  await loadState();
}

// 바텀 시트 토글
document.querySelector('.sheet-handle').addEventListener('click', (e) => {
  e.stopPropagation();
  if (!isMobile()) return;
  const panel = document.querySelector('.panel');
  if (panel.classList.contains('collapsed')) {
    panel.classList.replace('collapsed', 'expanded');
  } else if (panel.classList.contains('expanded')) {
    panel.classList.replace('expanded', 'collapsed');
  }
});

document.querySelector('.panel').addEventListener('click', () => {
  if (!isMobile()) return;
  const panel = document.querySelector('.panel');
  if (panel.classList.contains('collapsed')) {
    panel.classList.replace('collapsed', 'expanded');
  }
});

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let classroomList = [];
let scheduleClassroomId = null;

async function switchMainTab(tab) {
  const mainEl = document.querySelector('main');
  const schedPanel = document.getElementById('schedule-panel');
  const schedBtn = document.getElementById('schedule-tab-btn');
  if (tab === 'schedule') {
    mainEl.style.display = 'none';
    schedPanel.style.display = 'block';
    schedBtn.classList.add('active');
    if (classroomList.length === 0) await loadClassrooms();
  } else {
    mainEl.style.display = '';
    schedPanel.style.display = 'none';
    schedBtn.classList.remove('active');
  }
}

async function loadClassrooms() {
  try {
    const r = await fetch('/api/classrooms');
    classroomList = await r.json();
    if (classroomList.length) {
      scheduleClassroomId = classroomList[0].classroom_id;
      renderClassroomChips();
      await loadWeekSchedule(scheduleClassroomId);
    }
  } catch (e) {
    document.getElementById('schedule-list').innerHTML =
      '<p class="no-schedule">강의실 정보를 불러올 수 없습니다.</p>';
  }
}

function renderClassroomChips() {
  const el = document.getElementById('classroom-chips');
  el.innerHTML = classroomList.map(c =>
    `<button class="classroom-chip${c.classroom_id === scheduleClassroomId ? ' active' : ''}"
      onclick="selectClassroom(${c.classroom_id})">${escHtml(c.name)}</button>`
  ).join('');
}

async function selectClassroom(id) {
  scheduleClassroomId = id;
  renderClassroomChips();
  await loadWeekSchedule(id);
}

async function loadWeekSchedule(classroomId) {
  try {
    const r = await fetch(`/api/classrooms/${classroomId}/week`);
    const data = await r.json();
    const isClass = data.status === '수업 중';
    document.getElementById('status-dot').style.background =
      isClass ? 'var(--red)' : 'var(--green)';
    document.getElementById('status-text').textContent = data.status;
    const statusBar = document.getElementById('schedule-status-bar');
    let nextSpan = statusBar.querySelector('.status-next');
    if (!nextSpan) {
      nextSpan = document.createElement('span');
      nextSpan.className = 'status-next';
      statusBar.appendChild(nextSpan);
    }
    nextSpan.textContent =
      isClass && data.next_free ? `· 다음 빈 시간: ${data.next_free}` : '';
    const listEl = document.getElementById('schedule-list');
    listEl.innerHTML = data.week.map(day => {
      const dayLabel = `${escHtml(day.day_name)}요일${day.is_today ? ' (오늘)' : ''}`;
      const rows = day.schedules.length
        ? day.schedules.map(s =>
            `<div class="schedule-row${s.is_now ? ' now' : ''}">
              <div class="sched-time">${escHtml(s.start_time)} – ${escHtml(s.end_time)}</div>
              <div>
                <div class="sched-course">${escHtml(s.course_name)}${s.is_now ? '<span class="now-badge">지금</span>' : ''}</div>
                <div class="sched-prof">${escHtml(s.professor)}</div>
              </div>
            </div>`
          ).join('')
        : '<div class="day-empty">수업 없음</div>';
      return `<div class="day-section">
        <div class="day-header${day.is_today ? ' today' : ''}">${dayLabel}</div>
        ${rows}
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('schedule-list').innerHTML =
      '<p class="no-schedule">시간표를 불러올 수 없습니다.</p>';
  }
}

initStarRating();
loadState();
setInterval(loadState, 3000);
</script>
